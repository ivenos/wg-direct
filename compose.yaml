services:

  # ── Server ────────────────────────────────────────────────────────────────
  wg-server:
    image: ghcr.io/ivenos/wg-direct:latest
    container_name: wg-server
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
    environment:
      WG_ROLE:   server
      WG_SECRET: "replace-me-with-a-long-secret"
      # WG_PORT:    51820          # optional, default: 51820
      # WG_ADDRESS: 10.77.0.1/30  # optional, default: 10.77.0.1/30
    ports:
      - "51820:51820/udp"
    restart: unless-stopped

  # ── Client ────────────────────────────────────────────────────────────────
  wg-client:
    image: ghcr.io/ivenos/wg-direct:latest
    container_name: wg-client
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
    environment:
      WG_ROLE:            client
      WG_SECRET:          "replace-me-with-a-long-secret"
      WG_SERVER_ENDPOINT: "your-server.example.com:51820"
      # WG_ALLOWED_IPS: 10.77.0.1/32,192.168.10.0/24  # optional, default: 10.77.0.1/32
      # WG_ADDRESS:     10.77.0.2/30                   # optional, default: 10.77.0.2/30
      # WG_KEEPALIVE:   25                             # optional, default: 25
    restart: unless-stopped
