name: 🐛 Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Set WG_ROLE=...
        2. Set WG_SECRET=...
        3. Run `docker compose up`
        4. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant container logs here. Run `docker compose logs wg-server` or `docker compose logs wg-client`.
      render: shell
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Paste your `compose.yaml` environment section (redact secrets!).
      render: yaml
    validations:
      required: false

  - type: input
    id: image-version
    attributes:
      label: Image Version
      description: "Which image tag are you using? (e.g. `latest`, `v1.0.0`)"
      placeholder: "latest"
    validations:
      required: false

  - type: input
    id: docker-version
    attributes:
      label: Docker Version
      description: "Output of `docker --version`"
      placeholder: "Docker version 27.x.x"
    validations:
      required: false

  - type: input
    id: host-os
    attributes:
      label: Host OS
      description: "Operating system and version of the Docker host"
      placeholder: "Ubuntu 24.04 / Debian 12 / etc."
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information.
    validations:
      required: false
